
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcanum Insight - Tarot Records</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/6290e22709.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c0a09;
            color: #e7e5e4;
            overflow-x: hidden;
        }
        .font-cinzel { font-family: 'Cinzel', serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .glass {
            background: rgba(28, 25, 23, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(120, 113, 108, 0.2);
        }
        
        /* Fan Spread Specific Styles */
        .fan-container {
            position: relative;
            width: 100%;
            height: 500px;
            display: flex;
            justify-content: center;
            overflow: visible;
            margin-top: 50px;
        }

        .fan-card {
            position: absolute;
            bottom: -50px;
            width: 100px;
            height: 160px;
            transform-origin: bottom center;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: pointer;
            z-index: 10;
        }

        @media (min-width: 640px) {
            .fan-card {
                width: 120px;
                height: 200px;
            }
        }

        .fan-card:hover {
            z-index: 100 !important;
            transform: rotate(var(--angle)) translateY(-40px) scale(1.05) !important;
            filter: brightness(1.3) contrast(1.1);
            box-shadow: 0 20px 40px rgba(217, 119, 6, 0.2);
        }

        .fan-card.picked {
            transform: translateY(-1200px) rotate(0deg) scale(0.5) !important;
            opacity: 0;
            pointer-events: none;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes popIn {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .pop-in { animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        @media print {
            .no-print { display: none !important; }
        }
    </style>
